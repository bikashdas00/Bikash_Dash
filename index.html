<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mango.OS | Futuristic Export Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
        
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }

        .mango-glow {
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
        }

        .scanline {
            width: 100%; height: 2px;
            background: rgba(255, 215, 0, 0.1);
            position: absolute; top: 0;
            animation: scan 4s linear infinite;
            z-index: 10;
        }

        @keyframes scan {
            from { top: 0%; }
            to { top: 100%; }
        }
    </style>
</head>
<body>

    <div class="scanline"></div>

    <div class="relative z-10 flex flex-col h-screen justify-between p-10 pointer-events-none">
        
        <header class="flex justify-between items-center pointer-events-auto">
            <h1 class="text-3xl font-black tracking-tighter text-yellow-500 font-['Orbitron']">MANGO.OS <span class="text-xs text-white opacity-50 block tracking-widest">GLOBAL EXPORT v3.0</span></h1>
            <nav class="space-x-8 text-xs uppercase tracking-widest hidden md:flex">
                <a href="#" class="hover:text-yellow-400">Inventory</a>
                <a href="#" class="hover:text-yellow-400 text-yellow-500 border-b border-yellow-500">Terminal</a>
                <a href="#" class="hover:text-yellow-400">Logistics</a>
            </nav>
        </header>

        <div class="flex flex-col md:flex-row justify-between items-end gap-10">
            <div class="glass p-8 w-full md:w-96 pointer-events-auto">
                <h2 id="mango-name" class="text-5xl font-black font-['Orbitron'] mb-2 text-yellow-400 mango-glow uppercase">Alphonso</h2>
                <p id="mango-origin" class="text-sm opacity-60 mb-6 uppercase tracking-widest">Region: Ratnagiri, India</p>
                
                <div class="flex justify-between items-center mb-6 border-y border-white/10 py-4">
                    <span class="text-xs uppercase opacity-50">Market Price</span>
                    <span id="mango-price" class="text-3xl font-mono text-green-400 font-bold">$25.50/KG</span>
                </div>

                <button class="w-full bg-yellow-500 text-black font-bold py-4 rounded-lg hover:bg-yellow-400 transition transform hover:scale-105 active:scale-95">
                    INITIATE EXPORT PROXIMITY
                </button>
            </div>

            <div class="pointer-events-auto group">
                <div class="text-[10px] text-right opacity-40 uppercase mb-2">Visual Sync Verified</div>
                <img id="mango-img" src="https://images.unsplash.com/photo-1553279768-865429fa0078?auto=format&fit=crop&w=400" 
                     class="w-48 h-48 object-cover rounded-xl border-2 border-yellow-500/50 grayscale hover:grayscale-0 transition-all duration-700">
            </div>
        </div>

        <footer class="flex justify-center gap-4 pointer-events-auto">
            <button onclick="updateData('Alphonso')" class="px-6 py-2 glass text-xs uppercase tracking-widest hover:bg-yellow-500/20 transition">Alphonso</button>
            <button onclick="updateData('Langra')" class="px-6 py-2 glass text-xs uppercase tracking-widest hover:bg-yellow-500/20 transition">Langra</button>
            <button onclick="updateData('Haden')" class="px-6 py-2 glass text-xs uppercase tracking-widest hover:bg-yellow-500/20 transition">Haden</button>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Data Configuration
        const mangoData = {
            'Alphonso': { price: '$25.50/KG', origin: 'Region: Ratnagiri, India', img: 'https://images.unsplash.com/photo-1553279768-865429fa0078?auto=format&fit=crop&w=400', color: 0xFFD700 },
            'Langra': { price: '$15.20/KG', origin: 'Region: Varanasi, India', img: 'https://images.unsplash.com/photo-1591073113125-e46713c829ed?auto=format&fit=crop&w=400', color: 0x98FB98 },
            'Haden': { price: '$18.90/KG', origin: 'Region: Florida, USA', img: 'https://images.unsplash.com/photo-1601493700631-2b16ec4b4716?auto=format&fit=crop&w=400', color: 0xFF4500 }
        };

        function updateData(type) {
            const data = mangoData[type];
            document.getElementById('mango-name').innerText = type;
            document.getElementById('mango-price').innerText = data.price;
            document.getElementById('mango-origin').innerText = data.origin;
            document.getElementById('mango-img').src = data.img;
            // Update 3D Object Color
            mangoMesh.material.color.setHex(data.color);
        }

        // --- 3D SCENE SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Cyber Mango (Geometric Representation)
        const geometry = new THREE.IcosahedronGeometry(1.5, 1);
        const material = new THREE.MeshStandardMaterial({ 
            color: 0xFFD700, 
            wireframe: true,
            emissive: 0xFFD700,
            emissiveIntensity: 0.5
        });
        const mangoMesh = new THREE.Mesh(geometry, material);
        scene.add(mangoMesh);

        // Core of the Mango
        const coreGeo = new THREE.IcosahedronGeometry(1.2, 0);
        const coreMat = new THREE.MeshPhongMaterial({ color: 0xFFD700, transparent: true, opacity: 0.4 });
        const core = new THREE.Mesh(coreGeo, coreMat);
        mangoMesh.add(core);

        // Lighting
        const light = new THREE.PointLight(0xFFFFFF, 1, 100);
        light.position.set(10, 10, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        camera.position.z = 5;

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            mangoMesh.rotation.y += 0.005;
            mangoMesh.rotation.x += 0.003;
            // Floating motion
            mangoMesh.position.y = Math.sin(Date.now() * 0.002) * 0.2;
            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
