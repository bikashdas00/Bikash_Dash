<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIKASH TERMINAL - v4.0.2</title>
    <style>
        body {
            background-color: black;
            color: #00FF41; /* Classic Matrix Green */
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            margin: 0;
            padding: 20px;
        }

        #terminal {
            width: 100%;
            height: 90vh;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .header {
            color: white;
            border-bottom: 2px dashed #00FF41;
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00FF41;
        }

        .access-denied {
            color: #FF3131;
            font-weight: bold;
            font-size: 2em;
            text-align: center;
            border: 3px solid #FF3131;
            padding: 20px;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            background: rgba(0,0,0,0.9);
            box-shadow: 0 0 20px #FF3131;
            z-index: 100;
        }

        .loading-bar {
            color: yellow;
        }

        span.user { color: #00FF41; }
        span.system { color: #00bcd4; }
    </style>
</head>
<body onclick="showAccessDenied()">

    <div class="header">
        [ SYSTEM OVERRIDE BY: BIKASH ] <br>
        SECURITY LEVEL: CRITICAL | IP: 192.168.1.104 | STATUS: INFILTRATING...
    </div>

    <div id="terminal"></div>

    <div id="accessBox" class="access-denied">
        !! ACCESS DENIED !! <br>
        FIREWALL DETECTED BY BIKASH SYSTEM
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const accessBox = document.getElementById('accessBox');

        // হ্যাকিং ড্রামা টেক্সট
        const logs = [
            "> Initializing BIKASH_EXPLOIT_V2.exe...",
            "> Connecting to secure proxy 124.55.21.9...",
            "> Connection established.",
            "> Bypassing SSL layers...",
            "> Injecting SQL payloads into main database...",
            "> Found vulnerability in port 8080...",
            "> Downloading encrypted credentials...",
            "> [######..........] 30% complete",
            "> Decrypting SHA-256 hashes...",
            "> WARNING: Root access requested!",
            "> Brute-forcing admin password...",
            "> [##########......] 65% complete",
            "> Accessing Mainframe via BIKASH-GATEWAY...",
            "> SUCCESS: Admin privileges granted.",
            "> Executing: rm -rf /root/security_logs",
            "> Uploading virus: TROJAN_BIKASH_01...",
            "> [################] 100% complete",
            "> System compromised. Waiting for input...",
            "-------------------------------------------"
        ];

        let i = 0;
        function typeLog() {
            if (i < logs.length) {
                const line = document.createElement('div');
                line.innerHTML = logs[i];
                terminal.appendChild(line);
                terminal.scrollTop = terminal.scrollHeight;
                i++;
                setTimeout(typeLog, Math.random() * 800 + 200); // র‍্যান্ডম টাইপিং স্পিড
            } else {
                i = 0; // রিপিট হবে
                setTimeout(typeLog, 1000);
            }
        }

        // স্ক্রিনে ক্লিক করলে Access Denied দেখাবে
        function showAccessDenied() {
            accessBox.style.display = 'block';
            setTimeout(() => {
                accessBox.style.display = 'none';
            }, 2000);
        }

        // টাইপিং শুরু
        typeLog();

        // কিবোর্ড টিপলে হ্যাকিং স্টাইল কোড আসবে (Just for show)
        window.addEventListener('keydown', function(e) {
            const fakeCode = document.createElement('span');
            fakeCode.innerHTML = "GET /admin/login.php?id=" + Math.random().toString(36).substring(7) + " <br> ";
            terminal.appendChild(fakeCode);
            terminal.scrollTop = terminal.scrollHeight;
        });
    </script>
</body>
</html>
